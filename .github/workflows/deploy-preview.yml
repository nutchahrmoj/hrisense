name: Deploy Preview

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Deploy Preview to Vercel ──────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    # Skip ถ้าไม่มี Vercel secrets
    if: >-
      ${{ secrets.VERCEL_TOKEN != '' &&
          secrets.VERCEL_ORG_ID != '' &&
          secrets.VERCEL_PROJECT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Deploy to Vercel (Preview)
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--yes'
          working-directory: ./
          github-comment: true

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        if: steps.vercel-deploy.outputs.preview-url
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const previewUrl = '${{ steps.vercel-deploy.outputs.preview-url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Deployment**\n\nView the preview: ${previewUrl}`
            });

  # ─── แจ้งเตือนถ้าไม่มี secrets ───────────────────────────────────────────
  notify-skipped:
    name: Check Preview Configuration
    runs-on: ubuntu-latest
    if: >-
      ${{ secrets.VERCEL_TOKEN == '' ||
          secrets.VERCEL_ORG_ID == '' ||
          secrets.VERCEL_PROJECT_ID == '' }}
    steps:
      - name: Notify — Preview skipped
        run: |
          echo "::notice::⚠️ Preview deployment skipped — Vercel secrets not configured."
          echo "To enable preview deployments, add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets."
