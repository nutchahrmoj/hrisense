name: Database Migrations

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: db-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Test migrations on a fresh database ──────────────────────────────
  test-migrations:
    name: Test Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: |
          for i in 1 2 3; do
            echo "Attempt $i to start Supabase..."
            if supabase start; then
              echo "Supabase started successfully"
              break
            fi
            if [ $i -lt 3 ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
              supabase stop || true
            else
              echo "Failed to start Supabase after 3 attempts"
              exit 1
            fi
          done

      - name: Run migrations
        # db reset, not db push: db push targets a linked remote project and
        # needs supabase link. CI starts a local stack, so reset is the real
        # "apply all migrations from scratch" check.
        run: supabase db reset

      - name: Verify migrations
        run: |
          echo "Checking migration status..."
          supabase db diff --schema public --use-migra

      - if: always()
        run: supabase stop

  # ─── Generate migration diff for review ───────────────────────────────
  migration-diff:
    name: Migration Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: |
          for i in 1 2 3; do
            echo "Attempt $i to start Supabase..."
            if supabase start; then
              echo "Supabase started successfully"
              break
            fi
            if [ $i -lt 3 ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
              supabase stop || true
            else
              echo "Failed to start Supabase after 3 attempts"
              exit 1
            fi
          done

      - name: Generate diff
        run: |
          supabase db diff --schema public --use-migra --file migration-diff || true
          echo "=== Migration Diff ==="
          cat migration-diff.sql 2>/dev/null || echo "(no diff)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: migration-diff
          path: migration-diff.sql
          retention-days: 7

      - if: always()
        run: supabase stop
